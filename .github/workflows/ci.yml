name: CI

on:
  pull_request:
  push:
    branches: [ main, dev, feature/** ]

jobs:
  test-and-lint:
    name: Test, Lint, & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        # Default behavior checks out the exact commit for the event. For PR head use:
        # with: { ref: ${{ github.event.pull_request.head.sha }} }

      # 1) Setup Python first (no cache yet)
      - name: Setup Python (3.10)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 2) Install Poetry via pipx so it's on PATH for subsequent steps
      - name: Install Poetry
        shell: bash
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          poetry --version

      # 3) Re-run setup-python to enable Poetry cache (now that Poetry is available)
      - name: Install deps
        run: |
          poetry lock
          poetry install --with dev

      - name: Run checks and capture logs (fail correctly)
        shell: bash
        run: |
          set -euo pipefail
          status=0
          {
            poetry run ruff format --check .
            poetry run ruff check .
            poetry run mypy src --ignore-missing-imports
            poetry run pytest tests/unit
          } 2>&1 | tee failure-logs.txt || status=$?
          # re-emit the failing status so the job is marked failed
          exit $status

      - name: Upload failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: failure-logs.txt

  handle-failure:
    needs: [test-and-lint]
    if: ${{ needs.test-and-lint.result == 'failure' && github.actor != 'github-copilot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          name: failure-logs

      - name: Create issue and trigger Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const logs = fs.readFileSync('./failure-logs.txt', 'utf8');
            const titleRef = context.payload.pull_request?.head?.ref || context.ref;
            const issue = await github.rest.issues.create({
              owner, repo,
              title: `CI Failure on: ${titleRef}`,
              body: [
                `The CI workflow failed. Please investigate and propose a fix.`,
                `**Workflow Run:** [View Run](${runUrl})`,
                `**Triggered by:** @${context.actor}`,
                `---`,
                `### 🪵 Failure Logs:\n\`\`\`\n${logs}\n\`\`\``
              ].join('\n')
            });
            await github.rest.issues.createComment({
              owner, repo, issue_number: issue.data.number,
              body: '@github-copilot-workspace please propose a fix for the CI failures detailed in this issue.'
            });
