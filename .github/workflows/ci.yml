name: CI

on:
  pull_request:
  push:
    branches: [ main, dev, feature/** ]

jobs:
  lint-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff httpx
      - name: Ruff (lint)
        uses: astral-sh/ruff-action@v3
        with:
          args: check .
      - name: Unit tests (fast)
        env:
          DISABLE_FAISS: "1"    # keep tests model/FAISS-free
        run: |
          pytest tests/unit -q --maxfail=1 --disable-warnings \
            --cov=src/dementia_simulation --cov-report=xml:coverage.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload quick metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-metrics
          path: reports/quick_metrics.json
