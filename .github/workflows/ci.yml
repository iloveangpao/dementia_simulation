name: CI

on:
  pull_request:
  push:
    branches: [ main, dev, feature/** ]

jobs:
  test-and-lint:
    name: Test, Lint, & Type Check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}

      - name: Setup Python
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.10'
          cache: 'poetry'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        # This step now works because the previous one installed Poetry
        run: poetry install --with dev

      # ---- Run all checks sequentially ----
      - name: Run Ruff linter and formatter check
        run: |
          poetry run ruff format --check .
          poetry run ruff check .

      - name: Run mypy type checking
        run: poetry run mypy src --ignore-missing-imports

      - name: Run unit tests with coverage
        env:
          DISABLE_FAISS: "1"
        run: |
          poetry run pytest tests/unit -q --maxfail=1 --disable-warnings \
            --cov=src/dementia_simulation --cov-report=xml:coverage.xml

      - name: Upload coverage and test metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            coverage.xml
            reports/quick_metrics.json
